# Consigliere — Docker Compose
# Usage: docker compose up -d
#
# Required env vars (set in .env or export):
#   DATABASE_URL=ecto://postgres:postgres@db/consigliere
#   SECRET_KEY_BASE=<generate with: mix phx.gen.secret>
#
# Optional:
#   NETWORK=mainnet|testnet (default: testnet)
#   BSV_NODE_RPC_URL=http://host:18332
#   BSV_NODE_RPC_USER=user
#   BSV_NODE_RPC_PASSWORD=pass
#   ZMQ_RAW_TX=tcp://host:28332
#   ZMQ_HASH_BLOCK=tcp://host:28332
#   JUNGLE_BUS_ENABLED=true
#   JUNGLE_BUS_URL=https://junglebus.gorillapool.io
#   JUNGLE_BUS_SUBSCRIPTION_ID=<your subscription id>

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consigliere
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  consigliere:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/consigliere
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-changeme_generate_with_mix_phx_gen_secret_64chars_minimum_here_ok}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "5000"
      NETWORK: ${NETWORK:-testnet}
      BSV_NODE_RPC_URL: ${BSV_NODE_RPC_URL:-}
      BSV_NODE_RPC_USER: ${BSV_NODE_RPC_USER:-}
      BSV_NODE_RPC_PASSWORD: ${BSV_NODE_RPC_PASSWORD:-}
      ZMQ_RAW_TX: ${ZMQ_RAW_TX:-}
      ZMQ_HASH_BLOCK: ${ZMQ_HASH_BLOCK:-}
      JUNGLE_BUS_ENABLED: ${JUNGLE_BUS_ENABLED:-true}
      JUNGLE_BUS_URL: ${JUNGLE_BUS_URL:-https://junglebus.gorillapool.io}
      JUNGLE_BUS_SUBSCRIPTION_ID: ${JUNGLE_BUS_SUBSCRIPTION_ID:-}
    restart: unless-stopped

volumes:
  pgdata:
